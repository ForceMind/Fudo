<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fudo</title>
  <style>
    :root{
      --bg:#f3f7ff;
      --panel:#ffffff;
      --ink:#1f2937;
      --muted:#6b7280;
      --main:#94a3b8;
      --fast:#f97316;
      --safe:#10b981;
      --p1:#ef4444;
      --p2:#2563eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 10% 10%,#e4f2ff,var(--bg));color:var(--ink)}
    .app{max-width:1280px;margin:0 auto;padding:14px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
    .title{font-size:28px;font-weight:700}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:6px 10px;border:1px solid #e5e7eb;border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:12px}
    .board-wrap{position:relative;min-height:760px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden}
    #board{width:100%;height:100%;min-height:760px;display:block}
    .panel{display:grid;gap:10px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px}
    .card h3{margin:0 0 8px 0;font-size:14px}
    .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
    .row:last-child{margin-bottom:0}
    .label{color:var(--muted)}
    .value{font-weight:600}
    .players{display:grid;gap:8px}
    .player{border:1px solid #e5e7eb;border-radius:10px;padding:8px}
    .player-head{display:flex;justify-content:space-between;margin-bottom:6px}
    .name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px}
    .dot{width:10px;height:10px;border-radius:50%}
    .dice{display:flex;flex-wrap:wrap;gap:8px;min-height:36px}
    .die{min-width:36px;height:36px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-weight:700;cursor:pointer}
    .die.sel{background:#e0f2fe;border-color:#0284c7}
    .die:disabled{opacity:.45;cursor:not-allowed}
    .btn{width:100%;border:0;border-radius:10px;padding:8px 10px;font-size:13px;font-weight:700;cursor:pointer}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .btn.primary{background:#0ea5e9;color:#fff}
    .btn.success{background:#10b981;color:#fff}
    .btn.gray{background:#4b5563;color:#fff}
    .select{width:100%;height:34px;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#111827;padding:0 8px;font-size:13px}
    .check{display:flex;align-items:center;gap:8px;font-size:13px;color:#1f2937;margin-bottom:7px}
    .check input{width:15px;height:15px}
    .hint{margin-top:6px;font-size:12px;color:#4b5563;min-height:16px}
    .route{margin-top:7px;padding-top:7px;border-top:1px dashed #d1d5db;font-size:12px;color:#374151;min-height:28px}
    .log{list-style:none;margin:0;padding:0;display:grid;gap:5px;max-height:180px;overflow:auto}
    .log li{font-size:12px;background:#f8fafc;border:1px solid #e2e8f0;padding:6px 8px;border-radius:8px}
    .modal{position:absolute;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:10px;z-index:10}
    .modal.on{display:flex}
    .modal-card{width:min(420px,100%);background:#fff;border-radius:12px;padding:12px;border:1px solid #e5e7eb}
    .modal-card h4{margin:0 0 6px 0}
    .opts{display:grid;gap:8px}
    .opt{border:1px solid #d1d5db;border-radius:10px;padding:8px;text-align:left;background:#fff;cursor:pointer}
    .opt:disabled{opacity:.45;cursor:not-allowed}
    .toast-wrap{position:absolute;left:50%;top:10px;transform:translateX(-50%);display:grid;gap:6px;z-index:12;pointer-events:none}
    .toast{padding:8px 10px;border-radius:10px;color:#fff;font-size:12px;font-weight:700}
    .toast.info{background:#0369a1}.toast.ok{background:#0f766e}.toast.warn{background:#b45309}.toast.danger{background:#b91c1c}
    @media (max-width:1080px){.layout{grid-template-columns:1fr}.board-wrap,#board{min-height:620px}}
    @media (max-width:720px){.title{font-size:22px}.board-wrap,#board{min-height:520px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title">Fudo</div>
      <div class="chips">
        <div class="chip" id="chipTurn">回合 -</div>
        <div class="chip" id="chipTime">时间 -</div>
        <div class="chip" id="chipMode">模式 终点</div>
      </div>
    </div>

    <div class="layout">
      <section class="board-wrap">
        <svg id="board" viewBox="0 0 820 820">
          <g id="edges"></g>
          <g id="hilite"></g>
          <g id="nodes"></g>
          <g id="pieces"></g>
          <g id="labels"></g>
        </svg>
        <div class="modal" id="branchModal">
          <div class="modal-card">
            <h4>选择分叉路线</h4>
            <div class="hint" id="branchHint">请选择路线</div>
            <div class="opts" id="branchOpts"></div>
          </div>
        </div>
        <div class="toast-wrap" id="toasts"></div>
      </section>

      <aside class="panel">
        <div class="card">
          <h3>状态</h3>
          <div class="row"><span class="label">当前玩家</span><span class="value" id="txtPlayer">-</span></div>
          <div class="row"><span class="label">阶段</span><span class="value" id="txtPhase">-</span></div>
          <div class="row"><span class="label">当前骰子</span><span class="value" id="txtDie">-</span></div>
          <div class="row"><span class="label">最大回合</span><span class="value" id="txtMaxTurn">-</span></div>
        </div>

        <div class="card">
          <h3>玩家信息</h3>
          <div class="players" id="players"></div>
        </div>

        <div class="card">
          <h3>骰子选择区</h3>
          <div class="dice" id="dice"></div>
          <button class="btn primary" id="btnLock">锁定2个骰子并开始行动</button>
          <div class="hint" id="hintDice"></div>
        </div>

        <div class="card">
          <h3>棋子操作</h3>
          <button class="btn success" id="btnMove">移动选中棋子</button>
          <div class="hint" id="hintPiece"></div>
          <div class="route" id="routeInfo">可达结果：-</div>
        </div>

        <div class="card">
          <h3>控制</h3>
          <button class="btn gray" id="btnRestart">重新开局</button>
        </div>

        <div class="card">
          <h3>规则设置</h3>
          <div class="hint" style="margin-top:0">可调为更接近传统 Ludo 的规则。</div>
          <div style="margin-top:8px">
            <select class="select" id="selMode">
              <option value="END">终点模式（2子到达终点）</option>
              <option value="KILL">击杀模式（累计吃子5次）</option>
            </select>
          </div>
          <div style="margin-top:8px">
            <label class="check"><input type="checkbox" id="chkNeedSix">起点出门需点数6（Ludo）</label>
            <label class="check"><input type="checkbox" id="chkSafeStart">双方起始格为安全格</label>
            <label class="check"><input type="checkbox" id="chkPoolAdvanced">启用进阶骰池（用后移除+补充）</label>
          </div>
          <button class="btn gray" id="btnApplyRules">应用规则并重开</button>
        </div>

        <div class="card">
          <h3>日志</h3>
          <ul class="log" id="logs"></ul>
        </div>
      </aside>
    </div>
  </div>

  <script>
  (() => {
    const CFG = {
      board: {
        mainCount: 20,
        forks: [0, 5, 10, 15],
        segLen: 5,
        fastLen: 2,
        safeLen: 7,
        safeCells: 2,
        c: { x: 410, y: 410 },
        r: 290
      },
      play: {
        players: [
          { id: "P1", name: "玩家1", color: "#ef4444", start: 0 },
          { id: "P2", name: "玩家2", color: "#2563eb", start: 10 }
        ],
        pieces: 3,
        dice: [1, 2, 3, 4, 5, 6],
        dicePerTurn: 2,
        maxTurn: 20,
        mode: "END",
        winFinish: 2,
        winKill: 5,
        finishSteps: 24,
        allowMain: true,
        timer: 180,
        poolAdvanced: false,
        entry: {
          requireValue: 6,
          needExactToLeaveStart: true,
          startNodeSafe: true
        },
        refill: { on: false, per: 1, min: 1, max: 6 }
      },
      anim: { stepMs: 220 }
    };

    const ROUTE = {
      main: { n: "主路径", d: "标准距离" },
      fast: { n: "快路径", d: "少3格，风险高" },
      safe: { n: "安全路径", d: "多2格，含安全格" },
      spawn: { n: "出发", d: "进入棋盘" }
    };

    const STAGE = {
      selectDice: "选骰子",
      choosePiece: "选棋子",
      anim: "执行移动",
      branch: "选择分叉",
      end: "结束"
    };

    const NS = "http://www.w3.org/2000/svg";
    const R = {
      edges: document.getElementById("edges"),
      hilite: document.getElementById("hilite"),
      nodes: document.getElementById("nodes"),
      pieces: document.getElementById("pieces"),
      labels: document.getElementById("labels"),
      chipTurn: document.getElementById("chipTurn"),
      chipTime: document.getElementById("chipTime"),
      chipMode: document.getElementById("chipMode"),
      txtPlayer: document.getElementById("txtPlayer"),
      txtPhase: document.getElementById("txtPhase"),
      txtDie: document.getElementById("txtDie"),
      txtMaxTurn: document.getElementById("txtMaxTurn"),
      players: document.getElementById("players"),
      dice: document.getElementById("dice"),
      btnLock: document.getElementById("btnLock"),
      hintDice: document.getElementById("hintDice"),
      btnMove: document.getElementById("btnMove"),
      hintPiece: document.getElementById("hintPiece"),
      routeInfo: document.getElementById("routeInfo"),
      btnRestart: document.getElementById("btnRestart"),
      selMode: document.getElementById("selMode"),
      chkNeedSix: document.getElementById("chkNeedSix"),
      chkSafeStart: document.getElementById("chkSafeStart"),
      chkPoolAdvanced: document.getElementById("chkPoolAdvanced"),
      btnApplyRules: document.getElementById("btnApplyRules"),
      logs: document.getElementById("logs"),
      branchModal: document.getElementById("branchModal"),
      branchHint: document.getElementById("branchHint"),
      branchOpts: document.getElementById("branchOpts"),
      toasts: document.getElementById("toasts")
    };

    let board = null;
    let game = null;
    let sidSeq = 0;

    function el(tag, attrs = {}) {
      const n = document.createElementNS(NS, tag);
      Object.entries(attrs).forEach(([k, v]) => n.setAttribute(k, String(v)));
      return n;
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function t(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function buildBoard() {
      const nodes = new Map();
      const out = new Map();
      const edges = [];
      const forkSet = new Set(CFG.board.forks);

      function addNode(n) {
        nodes.set(n.id, n);
        if (!out.has(n.id)) out.set(n.id, []);
      }

      function addEdge(from, to, route, fork = null) {
        const e = { id: `${from}->${to}`, from, to, route, fork };
        edges.push(e);
        if (!out.has(from)) out.set(from, []);
        out.get(from).push(e);
      }

      for (let i = 0; i < CFG.board.mainCount; i += 1) {
        const ang = -Math.PI / 2 + (Math.PI * 2 * i) / CFG.board.mainCount;
        const x = CFG.board.c.x + Math.cos(ang) * CFG.board.r;
        const y = CFG.board.c.y + Math.sin(ang) * CFG.board.r;
        addNode({ id: `M${i}`, x, y, main: i, fork: forkSet.has(i), safe: false, type: "main" });
      }

      for (let i = 0; i < CFG.board.mainCount; i += 1) {
        addEdge(`M${i}`, `M${(i + 1) % CFG.board.mainCount}`, "main");
      }

      if (CFG.play.entry.startNodeSafe) {
        for (const p of CFG.play.players) {
          const startId = `M${p.start}`;
          const n = nodes.get(startId);
          if (n) n.safe = true;
        }
      }

      function branchPoints(a, b, count, offset) {
        const arr = [];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const len = Math.max(1, Math.hypot(dx, dy));
        let nx = -dy / len;
        let ny = dx / len;
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dot = nx * (mx - CFG.board.c.x) + ny * (my - CFG.board.c.y);
        if (dot < 0) {
          nx *= -1;
          ny *= -1;
        }
        for (let i = 1; i <= count; i += 1) {
          const tt = i / (count + 1);
          const bx = a.x + dx * tt;
          const by = a.y + dy * tt;
          const cv = Math.sin(Math.PI * tt);
          arr.push({ x: bx + nx * offset * cv, y: by + ny * offset * cv });
        }
        return arr;
      }

      for (const fi of CFG.board.forks) {
        const from = `M${fi}`;
        const ri = (fi + CFG.board.segLen) % CFG.board.mainCount;
        const to = `M${ri}`;
        const a = nodes.get(from);
        const b = nodes.get(to);
        const tag = `F${fi}`;

        const qCount = Math.max(0, CFG.board.fastLen - 1);
        if (qCount > 0) {
          const ps = branchPoints(a, b, qCount, -90);
          const ids = [];
          for (let i = 0; i < ps.length; i += 1) {
            const id = `${tag}_Q${i + 1}`;
            addNode({ id, x: ps[i].x, y: ps[i].y, safe: false, fork: false, type: "fast" });
            ids.push(id);
          }
          addEdge(from, ids[0], "fast", from);
          for (let i = 0; i < ids.length - 1; i += 1) addEdge(ids[i], ids[i + 1], "fast", from);
          addEdge(ids[ids.length - 1], to, "fast", from);
        } else {
          addEdge(from, to, "fast", from);
        }

        const sCount = Math.max(0, CFG.board.safeLen - 1);
        if (sCount > 0) {
          const ps = branchPoints(a, b, sCount, 130);
          const ids = [];
          const safePos = new Set();
          if (CFG.board.safeCells >= 1) safePos.add(Math.max(1, Math.floor((sCount + 1) / 3)));
          if (CFG.board.safeCells >= 2) safePos.add(Math.max(1, Math.floor(((sCount + 1) * 2) / 3)));
          for (let i = 0; i < ps.length; i += 1) {
            const id = `${tag}_S${i + 1}`;
            addNode({ id, x: ps[i].x, y: ps[i].y, safe: safePos.has(i + 1), fork: false, type: "safe" });
            ids.push(id);
          }
          addEdge(from, ids[0], "safe", from);
          for (let i = 0; i < ids.length - 1; i += 1) addEdge(ids[i], ids[i + 1], "safe", from);
          addEdge(ids[ids.length - 1], to, "safe", from);
        } else {
          addEdge(from, to, "safe", from);
        }
      }

      return { nodes, out, edges };
    }

    function newPlayers() {
      return CFG.play.players.map((tp) => {
        const pcs = [];
        for (let i = 0; i < CFG.play.pieces; i += 1) {
          pcs.push({
            id: `${tp.id}_K${i + 1}`,
            no: i + 1,
            owner: tp.id,
            state: "start",
            node: null,
            prog: 0
          });
        }
        return {
          id: tp.id,
          name: tp.name,
          color: tp.color,
          startNode: `M${tp.start}`,
          dice: [...CFG.play.dice],
          pieces: pcs,
          kills: 0
        };
      });
    }

    function initState() {
      return {
        players: newPlayers(),
        cur: 0,
        turn: 1,
        phase: "selectDice",
        selDiceIdx: [],
        selDiceVal: [],
        actionIdx: 0,
        die: null,
        optsByPiece: new Map(),
        selPiece: null,
        selOutcomes: [],
        logs: [],
        timer: CFG.play.timer,
        timerH: null,
        winner: null,
        reason: "",
        sid: 0
      };
    }

    function curPlayer() { return game.players[game.cur]; }
    function player(id) { return game.players.find((p) => p.id === id) || null; }

    function piece(id) {
      for (const p of game.players) {
        const it = p.pieces.find((x) => x.id === id);
        if (it) return it;
      }
      return null;
    }

    function finishedCount(p) { return p.pieces.filter((x) => x.state === "finished").length; }

    function canLeaveStartWithDie(die) {
      if (!CFG.play.entry.needExactToLeaveStart) return true;
      return die === CFG.play.entry.requireValue;
    }

    function outgoing(nodeRef, owner) {
      if (nodeRef === "START") {
        return [{ from: "START", to: player(owner).startNode, route: "spawn", fork: null }];
      }
      const arr = board.out.get(nodeRef) || [];
      const n = board.nodes.get(nodeRef);
      if (n && n.fork && !CFG.play.allowMain) return arr.filter((e) => e.route !== "main");
      return arr;
    }

    function piecesOn(nodeId, exclude = null) {
      const arr = [];
      for (const p of game.players) {
        for (const pc of p.pieces) {
          if (pc.id === exclude) continue;
          if (pc.state === "active" && pc.node === nodeId) arr.push(pc);
        }
      }
      return arr;
    }

    function canLand(pc, nodeId) {
      const n = board.nodes.get(nodeId);
      if (!n) return false;
      if (n.safe) return true;
      const os = piecesOn(nodeId, pc.id);
      if (os.length === 0) return true;
      if (os.some((x) => x.owner === pc.owner)) return false;
      return true;
    }

    function enumOutcomes(pc, die) {
      const out = [];
      const startNode = pc.state === "start" ? "START" : pc.node;
      if (pc.state === "start" && !canLeaveStartWithDie(die)) return out;

      function dfs(nodeRef, left, prog, path, dec) {
        if (prog >= CFG.play.finishSteps) {
          out.push({ finish: true, node: null, path: [...path], dec: [...dec] });
          return;
        }
        if (left === 0) {
          if (nodeRef !== "START" && canLand(pc, nodeRef)) {
            out.push({ finish: false, node: nodeRef, path: [...path], dec: [...dec] });
          }
          return;
        }
        const es = outgoing(nodeRef, pc.owner);
        if (es.length === 0) return;
        for (const e of es) {
          const np = prog + 1;
          const nPath = [...path, e.to];
          const nDec = [...dec];
          if (es.length > 1 && e.route !== "spawn") nDec.push({ fork: nodeRef, route: e.route });
          if (np >= CFG.play.finishSteps) {
            out.push({ finish: true, node: null, path: nPath, dec: nDec });
          } else {
            dfs(e.to, left - 1, np, nPath, nDec);
          }
        }
      }

      dfs(startNode, die, pc.prog, [], []);
      const uniq = new Map();
      for (const o of out) {
        const key = o.finish ? `F|${o.dec.map((d) => `${d.fork}:${d.route}`).join(",")}` : `${o.node}|${o.dec.map((d) => `${d.fork}:${d.route}`).join(",")}`;
        if (!uniq.has(key)) uniq.set(key, o);
      }
      return [...uniq.values()];
    }

    function legalExists(pc, nodeRef, prog, left, forced, memo) {
      const mk = `${nodeRef}|${prog}|${left}|${Object.entries(forced).sort().join(",")}`;
      if (memo.has(mk)) return memo.get(mk);
      if (prog >= CFG.play.finishSteps) { memo.set(mk, true); return true; }
      if (left === 0) {
        const ok = nodeRef !== "START" && canLand(pc, nodeRef);
        memo.set(mk, ok);
        return ok;
      }
      let es = outgoing(nodeRef, pc.owner);
      if (es.length === 0) { memo.set(mk, false); return false; }
      if (es.length > 1 && forced[nodeRef]) es = es.filter((e) => e.route === forced[nodeRef]);
      for (const e of es) {
        const np = prog + 1;
        if (np >= CFG.play.finishSteps) { memo.set(mk, true); return true; }
        if (legalExists(pc, e.to, np, left - 1, forced, memo)) { memo.set(mk, true); return true; }
      }
      memo.set(mk, false);
      return false;
    }

    function moveOptions(die) {
      const m = new Map();
      for (const pc of curPlayer().pieces) {
        if (pc.state === "finished") continue;
        const os = enumOutcomes(pc, die);
        if (os.length > 0) m.set(pc.id, os);
      }
      return m;
    }

    function log(msg) {
      const used = CFG.play.timer - game.timer;
      game.logs.unshift(`[${t(used)}] ${msg}`);
      if (game.logs.length > 20) game.logs.length = 20;
    }

    function toast(msg, kind = "info") {
      const n = document.createElement("div");
      n.className = `toast ${kind}`;
      n.textContent = msg;
      R.toasts.appendChild(n);
      setTimeout(() => n.remove(), 1700);
    }

    function drawStatic() {
      R.edges.innerHTML = "";
      R.nodes.innerHTML = "";
      R.labels.innerHTML = "";
      for (const e of board.edges) {
        const a = board.nodes.get(e.from);
        const b = board.nodes.get(e.to);
        if (!a || !b) continue;
        const line = el("line", {
          x1: a.x, y1: a.y, x2: b.x, y2: b.y,
          stroke: e.route === "main" ? "var(--main)" : e.route === "fast" ? "var(--fast)" : "var(--safe)",
          "stroke-width": e.route === "main" ? 3 : 4,
          "stroke-linecap": "round",
          opacity: e.route === "main" ? 0.75 : 0.9
        });
        if (e.route === "fast") line.setAttribute("stroke-dasharray", "6 6");
        R.edges.appendChild(line);
      }
      for (const n of board.nodes.values()) {
        const c = el("circle", {
          cx: n.x, cy: n.y, r: n.fork ? 11 : 8,
          stroke: n.fork ? "#92400e" : "#64748b",
          "stroke-width": n.fork ? 2 : 1.4,
          fill: n.safe ? "#d1fae5" : n.fork ? "#fde68a" : "#ffffff"
        });
        R.nodes.appendChild(c);
      }
      for (const p of CFG.play.players) {
        const s = board.nodes.get(`M${p.start}`);
        const m = el("circle", { cx: s.x, cy: s.y, r: 16, fill: "none", stroke: p.color, "stroke-width": 2.5, opacity: 0.85 });
        R.labels.appendChild(m);
      }
    }

    function offset(i, total) {
      if (total <= 1) return { dx: 0, dy: 0 };
      const a = (Math.PI * 2 * i) / total - Math.PI / 2;
      const rr = total <= 3 ? 11 : 15;
      return { dx: Math.cos(a) * rr, dy: Math.sin(a) * rr };
    }

    function movable(id) {
      return game.phase === "choosePiece" && game.optsByPiece.has(id);
    }

    function renderPieces() {
      R.pieces.innerHTML = "";
      const map = new Map();
      for (const p of game.players) {
        for (const pc of p.pieces) {
          if (pc.state !== "active") continue;
          if (!map.has(pc.node)) map.set(pc.node, []);
          map.get(pc.node).push(pc);
        }
      }
      for (const [nodeId, arr] of map.entries()) {
        const n = board.nodes.get(nodeId);
        if (!n) continue;
        for (let i = 0; i < arr.length; i += 1) {
          const pc = arr[i];
          const pp = player(pc.owner);
          const of = offset(i, arr.length);
          const sel = game.selPiece === pc.id;
          const mv = movable(pc.id) && pc.owner === curPlayer().id;
          const c = el("circle", {
            cx: n.x + of.dx, cy: n.y + of.dy,
            r: sel ? 11 : 9,
            fill: pp.color,
            stroke: sel ? "#fef3c7" : mv ? "#facc15" : "#ffffff",
            "stroke-width": sel ? 3 : mv ? 2.4 : 1.4
          });
          c.style.cursor = mv ? "pointer" : "default";
          if (mv) c.addEventListener("click", () => clickPiece(pc.id));
          R.pieces.appendChild(c);
          const tx = el("text", { x: n.x + of.dx, y: n.y + of.dy + 4, "text-anchor": "middle", "font-size": 10, "font-weight": 700, fill: "#fff" });
          tx.textContent = String(pc.no);
          R.pieces.appendChild(tx);
        }
      }
    }

    function renderHilite() {
      R.hilite.innerHTML = "";
      if (game.phase !== "choosePiece" || !game.selPiece || game.selOutcomes.length === 0) return;
      const pc = piece(game.selPiece);
      const from = pc.state === "start" ? player(pc.owner).startNode : pc.node;
      const edgeSet = new Set();
      for (const o of game.selOutcomes) {
        let prev = from;
        for (const id of o.path) {
          const k = `${prev}->${id}`;
          if (!edgeSet.has(k)) {
            const a = board.nodes.get(prev);
            const b = board.nodes.get(id);
            if (a && b) {
              const line = el("line", { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: "#f59e0b", "stroke-width": 5, opacity: 0.35, "stroke-linecap": "round" });
              R.hilite.appendChild(line);
            }
            edgeSet.add(k);
          }
          prev = id;
        }
      }
      const land = new Set();
      let fin = false;
      for (const o of game.selOutcomes) {
        if (o.finish) fin = true;
        else if (o.node) land.add(o.node);
      }
      for (const id of land) {
        const n = board.nodes.get(id);
        const ring = el("circle", { cx: n.x, cy: n.y, r: 16, fill: "none", stroke: "#f59e0b", "stroke-width": 2.5, "stroke-dasharray": "4 4", opacity: 0.85 });
        R.hilite.appendChild(ring);
      }
      R.routeInfo.textContent = `可到达终点：${fin ? "是" : "否"}；可落点数：${land.size}`;
    }

    function renderPlayers() {
      R.players.innerHTML = "";
      const cp = curPlayer();
      for (const p of game.players) {
        const start = p.pieces.filter((x) => x.state === "start").length;
        const active = p.pieces.filter((x) => x.state === "active").length;
        const fin = finishedCount(p);
        const box = document.createElement("div");
        box.className = "player";
        box.style.borderColor = p.id === cp.id ? "#0ea5e9" : "#e5e7eb";
        box.innerHTML = `
          <div class="player-head">
            <div class="name"><span class="dot" style="background:${p.color}"></span>${p.name}</div>
            <div class="label">${p.id === cp.id ? "行动中" : "等待中"}</div>
          </div>
          <div class="row"><span class="label">起点 / 行进 / 终点</span><span class="value">${start} / ${active} / ${fin}</span></div>
          <div class="row"><span class="label">吃子数</span><span class="value">${p.kills}</span></div>
          <div class="row"><span class="label">骰池</span><span class="value">${p.dice.join(", ") || "-"}</span></div>
        `;
        R.players.appendChild(box);
      }
    }

    function renderDice() {
      R.dice.innerHTML = "";
      const can = game.phase === "selectDice";
      curPlayer().dice.forEach((v, i) => {
        const b = document.createElement("button");
        b.className = `die${game.selDiceIdx.includes(i) ? " sel" : ""}`;
        b.textContent = String(v);
        b.disabled = !can;
        b.addEventListener("click", () => clickDie(i));
        R.dice.appendChild(b);
      });
      R.btnLock.disabled = !(can && game.selDiceIdx.length === CFG.play.dicePerTurn);
    }

    function renderStatus() {
      R.chipTurn.textContent = `回合 ${game.turn}/${CFG.play.maxTurn}`;
      R.chipTime.textContent = `时间 ${t(game.timer)}`;
      R.chipMode.textContent = CFG.play.mode === "END" ? `模式 终点(${CFG.play.winFinish}子)` : `模式 击杀(${CFG.play.winKill})`;
      R.txtPlayer.textContent = curPlayer().name;
      R.txtPhase.textContent = STAGE[game.phase] || "-";
      R.txtDie.textContent = game.die == null ? "-" : String(game.die);
      R.txtMaxTurn.textContent = String(CFG.play.maxTurn);

      if (game.phase === "selectDice") {
        const entryText = CFG.play.entry.needExactToLeaveStart
          ? `，出门需${CFG.play.entry.requireValue}`
          : "";
        R.hintDice.textContent = `请选择 2 个骰子（${game.selDiceIdx.length}/2）${entryText}`;
        R.hintPiece.textContent = "锁定骰子后点击己方棋子。";
      } else if (game.phase === "choosePiece") {
        R.hintDice.textContent = `本回合骰子：${game.selDiceVal.join("、")}`;
        R.hintPiece.textContent = `当前骰子 ${game.die}，可移动棋子 ${game.optsByPiece.size} 个。`;
      } else if (game.phase === "anim") {
        R.hintPiece.textContent = "棋子移动中...";
      } else if (game.phase === "branch") {
        R.hintPiece.textContent = "请在分叉点选择路线。";
      } else {
        R.hintPiece.textContent = game.reason || "对局结束";
      }
      R.btnMove.disabled = !(game.phase === "choosePiece" && !!game.selPiece);
    }

    function renderLogs() {
      R.logs.innerHTML = "";
      if (game.logs.length === 0) {
        const li = document.createElement("li");
        li.textContent = "等待操作...";
        R.logs.appendChild(li);
        return;
      }
      for (const x of game.logs) {
        const li = document.createElement("li");
        li.textContent = x;
        R.logs.appendChild(li);
      }
    }

    function renderAll() {
      renderStatus();
      renderPlayers();
      renderDice();
      renderHilite();
      renderPieces();
      renderLogs();
    }

    function clickDie(i) {
      if (game.phase !== "selectDice") return;
      const at = game.selDiceIdx.indexOf(i);
      if (at >= 0) game.selDiceIdx.splice(at, 1);
      else if (game.selDiceIdx.length < CFG.play.dicePerTurn) game.selDiceIdx.push(i);
      renderAll();
    }

    function lockDice() {
      if (game.phase !== "selectDice") return;
      if (game.selDiceIdx.length !== CFG.play.dicePerTurn) return;
      game.selDiceVal = game.selDiceIdx.map((i) => curPlayer().dice[i]);
      game.actionIdx = 0;
      game.selPiece = null;
      game.selOutcomes = [];
      log(`${curPlayer().name} 选择骰子 ${game.selDiceVal.join("、")}`);
      beginAction();
    }

    function noMoveReasonText(p, die) {
      if (!canLeaveStartWithDie(die)) {
        const allAtStartOrFinish = p.pieces.every((pc) => pc.state === "start" || pc.state === "finished");
        if (allAtStartOrFinish) {
          return `出门需点数${CFG.play.entry.requireValue}，本次无法出门`;
        }
      }
      return `骰子 ${die} 无可移动棋子`;
    }

    function beginAction() {
      if (game.phase === "end") return;
      if (game.actionIdx >= game.selDiceVal.length) {
        endTurn();
        return;
      }
      game.die = game.selDiceVal[game.actionIdx];
      game.selPiece = null;
      game.selOutcomes = [];
      game.optsByPiece = moveOptions(game.die);
      game.phase = "choosePiece";
      if (game.optsByPiece.size === 0) {
        const reason = noMoveReasonText(curPlayer(), game.die);
        log(`${curPlayer().name} ${reason}，自动跳过`);
        toast(reason, "warn");
        game.actionIdx += 1;
        setTimeout(() => { if (game.phase !== "end") beginAction(); }, 350);
      }
      renderAll();
    }

    function clickPiece(id) {
      if (game.phase !== "choosePiece") return;
      if (!game.optsByPiece.has(id)) return;
      game.selPiece = id;
      game.selOutcomes = game.optsByPiece.get(id) || [];
      const arr = [];
      for (const o of game.selOutcomes) {
        const dst = o.finish ? "到达终点" : `落点 ${o.node}`;
        const rt = o.dec.length === 0 ? "无分叉" : o.dec.map((d) => ROUTE[d.route]?.n || d.route).join(" -> ");
        arr.push(`${dst}(${rt})`);
      }
      R.routeInfo.textContent = arr.length ? arr.join("；") : "可达结果：-";
      renderAll();
    }

    function startMove() {
      if (game.phase !== "choosePiece" || !game.selPiece) return;
      game.phase = "anim";
      const ctx = {
        sid: game.sid,
        pieceId: game.selPiece,
        die: game.die,
        left: game.die,
        forced: {}
      };
      runMove(ctx);
    }

    function viableEdges(pc, ctx, nodeRef, es) {
      const arr = [];
      for (const e of es) {
        const forced = { ...ctx.forced, [nodeRef]: e.route };
        const np = pc.prog + 1;
        if (np >= CFG.play.finishSteps) { arr.push(e); continue; }
        if (legalExists(pc, e.to, np, ctx.left - 1, forced, new Map())) arr.push(e);
      }
      return arr;
    }

    function runMove(ctx) {
      if (ctx.sid !== game.sid || game.phase === "end") return;
      const pc = piece(ctx.pieceId);
      if (!pc) return;
      if (pc.prog >= CFG.play.finishSteps || ctx.left <= 0) {
        finishAction(ctx);
        return;
      }
      const ref = pc.state === "start" ? "START" : pc.node;
      let es = outgoing(ref, pc.owner);
      if (es.length === 0) { finishAction(ctx); return; }
      if (es.length > 1 && ctx.forced[ref]) es = es.filter((e) => e.route === ctx.forced[ref]);
      if (es.length > 1) {
        const ok = viableEdges(pc, ctx, ref, es);
        if (ok.length === 0) { finishAction(ctx); return; }
        openBranch(pc, ctx, ref, ok);
        return;
      }
      step(ctx, es[0]);
    }

    function openBranch(pc, ctx, ref, es) {
      game.phase = "branch";
      R.branchHint.textContent = `${player(pc.owner).name} 到达分叉点，请选择路线`;
      R.branchOpts.innerHTML = "";
      for (const e of es) {
        const b = document.createElement("button");
        b.className = "opt";
        b.innerHTML = `<div style="font-weight:700;font-size:14px">${ROUTE[e.route].n}</div><div class="hint">${ROUTE[e.route].d}</div>`;
        b.addEventListener("click", () => {
          R.branchModal.classList.remove("on");
          ctx.forced[ref] = e.route;
          game.phase = "anim";
          step(ctx, e);
        });
        R.branchOpts.appendChild(b);
      }
      R.branchModal.classList.add("on");
      renderAll();
    }

    function step(ctx, e) {
      if (ctx.sid !== game.sid) return;
      const pc = piece(ctx.pieceId);
      if (!pc) return;
      game.phase = "anim";
      ctx.left -= 1;
      if (pc.state === "start") pc.state = "active";
      pc.node = e.to;
      pc.prog += 1;
      renderAll();
      if (pc.prog >= CFG.play.finishSteps) {
        pc.state = "finished";
        pc.node = null;
        toast(`${player(pc.owner).name} 棋子#${pc.no} 到达终点`, "ok");
        log(`${player(pc.owner).name} 棋子#${pc.no} 到达终点`);
        setTimeout(() => finishAction(ctx), CFG.anim.stepMs);
        return;
      }
      setTimeout(() => runMove(ctx), CFG.anim.stepMs);
    }

    function capture(pc) {
      if (pc.state !== "active" || !pc.node) return 0;
      const n = board.nodes.get(pc.node);
      if (!n || n.safe) return 0;
      const hit = [];
      for (const p of game.players) {
        if (p.id === pc.owner) continue;
        for (const ep of p.pieces) if (ep.state === "active" && ep.node === pc.node) hit.push(ep);
      }
      if (hit.length === 0) return 0;
      for (const ep of hit) {
        ep.state = "start";
        ep.node = null;
        ep.prog = 0;
      }
      player(pc.owner).kills += hit.length;
      log(`${player(pc.owner).name} 吃子 x${hit.length}`);
      toast(`${player(pc.owner).name} 吃子 x${hit.length}`, "danger");
      return hit.length;
    }

    function checkWin() {
      if (game.phase === "end") return true;
      for (const p of game.players) {
        if (CFG.play.mode === "END" && finishedCount(p) >= CFG.play.winFinish) {
          finishGame(p.id, `${p.name} 率先达成 ${CFG.play.winFinish} 子终点`);
          return true;
        }
        if (CFG.play.mode === "KILL" && p.kills >= CFG.play.winKill) {
          finishGame(p.id, `${p.name} 累计吃子 ${CFG.play.winKill} 次`);
          return true;
        }
      }
      return false;
    }

    function finishAction(ctx) {
      if (ctx.sid !== game.sid || game.phase === "end") return;
      const pc = piece(ctx.pieceId);
      if (pc && pc.state === "active") capture(pc);
      if (checkWin()) { renderAll(); return; }
      game.actionIdx += 1;
      game.selPiece = null;
      game.selOutcomes = [];
      R.branchModal.classList.remove("on");
      if (game.actionIdx >= game.selDiceVal.length) endTurn();
      else beginAction();
    }

    function removeDice(p, vals) {
      for (const v of vals) {
        const i = p.dice.indexOf(v);
        if (i >= 0) p.dice.splice(i, 1);
      }
    }

    function refill(p) {
      if (!CFG.play.refill.on) return;
      for (let i = 0; i < CFG.play.refill.per; i += 1) p.dice.push(rand(CFG.play.refill.min, CFG.play.refill.max));
    }

    function cmp(a, b) {
      const fd = finishedCount(a) - finishedCount(b);
      if (fd !== 0) return fd;
      const kd = a.kills - b.kills;
      if (kd !== 0) return kd;
      return 0;
    }

    function endByLimit(reason) {
      const [a, b] = game.players;
      const d = cmp(a, b);
      if (d === 0) finishGame(null, `${reason}，平局`);
      else finishGame(d > 0 ? a.id : b.id, `${reason}，${d > 0 ? a.name : b.name} 领先`);
    }

    function endTurn() {
      if (game.phase === "end") return;
      const cp = curPlayer();
      if (CFG.play.poolAdvanced) {
        removeDice(cp, game.selDiceVal);
        refill(cp);
        while (cp.dice.length < CFG.play.dicePerTurn) cp.dice.push(rand(CFG.play.refill.min, CFG.play.refill.max));
      }
      game.selDiceIdx = [];
      game.selDiceVal = [];
      game.actionIdx = 0;
      game.die = null;
      game.optsByPiece = new Map();
      game.selPiece = null;
      game.selOutcomes = [];
      if (checkWin()) { renderAll(); return; }
      if (game.turn >= CFG.play.maxTurn) { endByLimit(`达到最大回合 ${CFG.play.maxTurn}`); return; }
      game.turn += 1;
      game.cur = (game.cur + 1) % game.players.length;
      game.phase = "selectDice";
      log(`轮到 ${curPlayer().name} 行动`);
      renderAll();
    }

    function finishGame(winnerId, reason) {
      game.phase = "end";
      game.winner = winnerId;
      game.reason = reason;
      if (game.timerH) { clearInterval(game.timerH); game.timerH = null; }
      if (winnerId) {
        log(`对局结束：${reason}`);
        toast(`胜者：${player(winnerId).name}`, "ok");
      } else {
        log(`对局结束：${reason}`);
        toast("对局结束：平局", "warn");
      }
      R.branchModal.classList.remove("on");
      renderAll();
    }

    function syncRulePanel() {
      R.selMode.value = CFG.play.mode;
      R.chkNeedSix.checked = CFG.play.entry.needExactToLeaveStart;
      R.chkSafeStart.checked = CFG.play.entry.startNodeSafe;
      R.chkPoolAdvanced.checked = CFG.play.poolAdvanced;
    }

    function applyRulesAndRestart() {
      CFG.play.mode = R.selMode.value === "KILL" ? "KILL" : "END";
      CFG.play.entry.needExactToLeaveStart = !!R.chkNeedSix.checked;
      CFG.play.entry.startNodeSafe = !!R.chkSafeStart.checked;
      CFG.play.poolAdvanced = !!R.chkPoolAdvanced.checked;
      restart();
      toast("新规则已应用", "info");
    }

    function startTimer() {
      if (game.timerH) clearInterval(game.timerH);
      game.timerH = setInterval(() => {
        if (game.phase === "end") return;
        game.timer -= 1;
        if (game.timer <= 0) {
          game.timer = 0;
          renderAll();
          endByLimit("倒计时结束");
          return;
        }
        renderStatus();
      }, 1000);
    }

    function restart() {
      if (game && game.timerH) clearInterval(game.timerH);
      game = initState();
      sidSeq += 1;
      game.sid = sidSeq;
      syncRulePanel();
      board = buildBoard();
      drawStatic();
      log("新对局开始，玩家1先手");
      renderAll();
      startTimer();
    }

    function bind() {
      R.btnLock.addEventListener("click", lockDice);
      R.btnMove.addEventListener("click", startMove);
      R.btnRestart.addEventListener("click", restart);
      R.btnApplyRules.addEventListener("click", applyRulesAndRestart);
    }

    bind();
    restart();
  })();
  </script>
</body>
</html>
